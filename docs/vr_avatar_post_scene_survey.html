<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>VR Avatar Study Survey</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #172033;
      --muted: #667085;
      --line: #d0d5dd;
      --fill: #f8fafc;
      --accent: #2457c5;
    }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--ink);
      background: #ffffff;
    }
    main {
      max-width: 1040px;
      margin: 0 auto;
      padding: 28px 20px 48px;
    }
    h1 {
      font-size: 30px;
      margin: 0 0 8px;
    }
    h2 {
      font-size: 22px;
      margin: 30px 0 12px;
      border-top: 1px solid var(--line);
      padding-top: 20px;
    }
    h3 {
      font-size: 18px;
      margin: 18px 0 10px;
    }
    p, label, th, td {
      font-size: 15px;
      line-height: 1.45;
    }
    .meta, .actions {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 12px;
      margin: 18px 0;
    }
    .field {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    input, select, textarea {
      font: inherit;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 8px 10px;
      background: #fff;
    }
    textarea {
      min-height: 82px;
      resize: vertical;
    }
    .scene {
      background: var(--fill);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px;
      margin: 16px 0;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin: 10px 0 16px;
      background: #fff;
    }
    th, td {
      border: 1px solid var(--line);
      padding: 8px;
      text-align: center;
      vertical-align: middle;
    }
    th:first-child, td:first-child {
      text-align: left;
      width: 44%;
    }
    .scale-note {
      color: var(--muted);
      margin: 0 0 10px;
    }
    button {
      border: 0;
      border-radius: 6px;
      padding: 10px 14px;
      background: var(--accent);
      color: white;
      font-weight: 700;
      cursor: pointer;
    }
    button.secondary {
      background: #475467;
    }
    button.danger {
      background: #b42318;
    }
    .small {
      color: var(--muted);
      font-size: 13px;
    }
  </style>
</head>
<body>
<main>
  <h1>VR Avatar Study Survey</h1>
  <p class="small">Use once per participant. Complete the post-scene block after each VR scene, then complete the final block at the end.</p>

  <section class="meta">
    <label class="field">Participant ID
      <input id="participantId" autocomplete="off">
    </label>
    <label class="field">Login ID
      <input id="loginId" autocomplete="off">
    </label>
    <label class="field">Session ID
      <input id="sessionId" autocomplete="off">
    </label>
    <label class="field">Avatar condition
      <select id="avatarCondition">
        <option value="detached_observer">Detached Observer</option>
        <option value="supportive_companion">Supportive Companion</option>
        <option value="context_aware_guide">Context-aware Guide</option>
        <option value="no_avatar">No avatar baseline</option>
      </select>
    </label>
  </section>

  <h2>Post-scene measures</h2>
  <p class="scale-note">SAM: 1-9. Likert items: 1 = strongly disagree, 7 = strongly agree.</p>
  <div id="scenes"></div>

  <h2>Final avatar evaluation</h2>
  <table data-section="final">
    <tbody id="finalItems"></tbody>
  </table>
  <label class="field">Optional final comment
    <textarea id="finalComment"></textarea>
  </label>

  <section class="actions">
    <button type="button" id="saveLocal">Save in browser</button>
    <button type="button" id="downloadJson">Download JSON</button>
    <button type="button" id="downloadCsv">Download CSV</button>
    <button type="button" class="danger" id="clearLocal">Clear form</button>
  </section>
</main>

<script>
const scenes = [
  "Attic",
  "Tunnel",
  "Lake",
  "Puppies",
  "Elephant",
  "SolitaryConfinement"
];

const sceneItems = [
  ["sam_valence", "SAM valence: unpleasant to pleasant", 9],
  ["sam_arousal", "SAM arousal: calm to excited", 9],
  ["sam_dominance", "SAM dominance/control: controlled to in-control", 9],
  ["social_presence", "I felt that the avatar was socially present in the scene.", 7],
  ["autonomy", "I felt free to decide what to do in the scene.", 7],
  ["agency", "The avatar seemed capable of influencing what I did.", 7],
  ["helpfulness", "The avatar's response was helpful for this scene.", 7],
  ["trust", "I trusted the avatar's response.", 7],
  ["intrusiveness", "The avatar felt intrusive or distracting.", 7],
  ["warmth", "The avatar felt warm and supportive.", 7],
  ["competence", "The avatar seemed competent.", 7],
  ["context_awareness", "The avatar seemed aware of the scene context.", 7],
  ["guidance_clarity", "The avatar gave clear guidance when needed.", 7],
  ["attention_accuracy", "The avatar seemed to understand what I was attending to.", 7],
  ["conversation_naturalness", "The conversation with the avatar felt natural.", 7]
];

const finalItems = [
  ["role_clarity", "The avatar's role/personality was clear."],
  ["condition_distinctiveness", "This avatar condition felt distinct from a generic assistant."],
  ["uncanny", "The avatar felt uncanny or uncomfortable."],
  ["voice_fit", "The voice fit the avatar role."],
  ["avatar_fit", "The avatar appearance fit the study context."],
  ["future_use", "I would be willing to interact with this avatar again in VR."]
];

function radioRow(name, label, max) {
  let cells = `<td>${label}</td>`;
  for (let i = 1; i <= max; i++) {
    cells += `<td><label><input type="radio" name="${name}" value="${i}"><br>${i}</label></td>`;
  }
  return `<tr>${cells}</tr>`;
}

function buildScene(scene, index) {
  const rows = sceneItems.map(([id, label, max]) =>
    radioRow(`scene_${index}_${id}`, label, max)
  ).join("");
  return `
    <section class="scene" data-scene="${scene}" data-scene-index="${index}">
      <h3>Scene ${index + 1}: ${scene}</h3>
      <table><tbody>${rows}</tbody></table>
      <label class="field">Optional comment for this scene
        <textarea name="scene_${index}_comment"></textarea>
      </label>
    </section>`;
}

function buildFinalRows() {
  document.getElementById("finalItems").innerHTML = finalItems.map(([id, label]) =>
    radioRow(`final_${id}`, label, 7)
  ).join("");
}

function checkedValue(name) {
  const selected = document.querySelector(`input[name="${name}"]:checked`);
  return selected ? Number(selected.value) : null;
}

function collectData() {
  const data = {
    surveyVersion: "vr_avatar_post_scene_html_v1",
    exportedAtUtc: new Date().toISOString(),
    participantId: document.getElementById("participantId").value.trim(),
    loginId: document.getElementById("loginId").value.trim(),
    sessionId: document.getElementById("sessionId").value.trim(),
    avatarCondition: document.getElementById("avatarCondition").value,
    scenes: [],
    final: {},
    finalComment: document.getElementById("finalComment").value.trim()
  };

  scenes.forEach((scene, index) => {
    const record = { sceneName: scene, sceneIndex: index };
    sceneItems.forEach(([id]) => {
      record[id] = checkedValue(`scene_${index}_${id}`);
    });
    const comment = document.querySelector(`textarea[name="scene_${index}_comment"]`);
    record.comment = comment ? comment.value.trim() : "";
    data.scenes.push(record);
  });

  finalItems.forEach(([id]) => {
    data.final[id] = checkedValue(`final_${id}`);
  });
  return data;
}

function download(filename, mime, text) {
  const blob = new Blob([text], { type: mime });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
}

function toCsv(data) {
  const rows = [];
  const sceneKeys = sceneItems.map(([id]) => id);
  rows.push(["participantId", "loginId", "sessionId", "avatarCondition", "sceneName", "sceneIndex", ...sceneKeys, "comment"].join(","));
  data.scenes.forEach(scene => {
    const values = [
      data.participantId,
      data.loginId,
      data.sessionId,
      data.avatarCondition,
      scene.sceneName,
      scene.sceneIndex,
      ...sceneKeys.map(key => scene[key] ?? ""),
      scene.comment || ""
    ];
    rows.push(values.map(value => `"${String(value).replaceAll('"', '""')}"`).join(","));
  });
  return rows.join("\n");
}

function saveLocal() {
  localStorage.setItem("vr_avatar_study_survey", JSON.stringify(collectData()));
}

function loadLocal() {
  const raw = localStorage.getItem("vr_avatar_study_survey");
  if (!raw) return;
  try {
    const data = JSON.parse(raw);
    for (const key of ["participantId", "loginId", "sessionId", "avatarCondition", "finalComment"]) {
      if (data[key] !== undefined && document.getElementById(key)) {
        document.getElementById(key).value = data[key];
      }
    }
    if (Array.isArray(data.scenes)) {
      data.scenes.forEach((scene, index) => {
        sceneItems.forEach(([id]) => {
          const value = scene[id];
          if (value !== null && value !== undefined) {
            const input = document.querySelector(`input[name="scene_${index}_${id}"][value="${value}"]`);
            if (input) input.checked = true;
          }
        });
        const comment = document.querySelector(`textarea[name="scene_${index}_comment"]`);
        if (comment) comment.value = scene.comment || "";
      });
    }
    if (data.final) {
      finalItems.forEach(([id]) => {
        const value = data.final[id];
        if (value !== null && value !== undefined) {
          const input = document.querySelector(`input[name="final_${id}"][value="${value}"]`);
          if (input) input.checked = true;
        }
      });
    }
  } catch (error) {
    console.warn("Failed to load saved survey", error);
  }
}

document.getElementById("scenes").innerHTML = scenes.map(buildScene).join("");
buildFinalRows();
loadLocal();

document.getElementById("saveLocal").addEventListener("click", saveLocal);
document.getElementById("downloadJson").addEventListener("click", () => {
  const data = collectData();
  download(`vr_avatar_survey_${data.participantId || "participant"}_${Date.now()}.json`, "application/json", JSON.stringify(data, null, 2));
});
document.getElementById("downloadCsv").addEventListener("click", () => {
  const data = collectData();
  download(`vr_avatar_survey_${data.participantId || "participant"}_${Date.now()}.csv`, "text/csv", toCsv(data));
});
document.getElementById("clearLocal").addEventListener("click", () => {
  if (!confirm("Clear saved browser data and reset the form?")) return;
  localStorage.removeItem("vr_avatar_study_survey");
  location.reload();
});
</script>
</body>
</html>
